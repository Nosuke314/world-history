<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>世界史一問一答</title>
    <style>
      #tabBar {
  position: fixed;
  bottom: 0;
  left: 0;

  width: 100%;

  display: flex;
}

#tabBar button {
  flex: 1;
  height: 60px;
}
      </style>
  </head>
  <body>
    <h1>一問一答</h1>

    <p id="question"></p>

    <button id="showAnswer">答えを見る</button>

    <p id="answer"></p>

    <button id="correct">○</button>
    <button id="wrong">×</button>

    <p id="score">○: 0 ×: 0</p>

    <button id="pause">STOP</button>

    <button id="next">次へ</button>

    <p id="todayRecord"></p>

    <p id="version"></p>

    <div id="quizPage">
  <!-- 今の問題ページ -->
</div>

<div id="recordPage" style="display:none;">
  <h2>学習記録</h2>

  <canvas id="accuracyChart"></canvas>

  <p id="todayRecord"></p>
</div>

  <h3>難易度</h3>

    <label><input type="checkbox" value="1" checked>1</label>
    <label><input type="checkbox" value="2" checked>2</label>
    <label><input type="checkbox" value="3" checked>3</label>
    <label><input type="checkbox" value="4" checked>4</label>
    <label><input type="checkbox" value="5" checked>5</label>
    <label><input type="checkbox" value="6" checked>6</label>
    <label><input type="checkbox" value="7" checked>7</label>

    <h3>範囲</h3>
    <div id="rangeFilters"></div>
    
<nav id="tabBar">
  <button id="quizTab">📖 問題</button>
  <button id="recordTab">📊 記録</button>
</nav>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
      const ctx =
        document.getElementById("accuracyChart");

      const accuracyChart =
        new Chart(ctx, {
          type: "pie",
          data: {
            labels: ["正解", "不正解"],
            datasets: [{
              data: [0, 0]
            }]
          }
        });

      function updateChart() {
        accuracyChart.data.datasets[0].data = [
          correctCount,
          wrongCount
        ];

        accuracyChart.update();
      }
      
      let questions = [];

      const CSV_URL =
        "https://docs.google.com/spreadsheets/d/1eNS2fFJfqQBNNwb1vo90qftKZvcm5fRhXa7hTcu299w/gviz/tq?tqx=out:csv";

fetch(CSV_URL)
  .then(response => response.text())
  .then(text => {

    const rows = text.trim().split("\n");

    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(",");

      questions.push({
        range: cols[0],
        difficulty: cols[1],
        question: cols[2],
        answer: cols[3]
      });
    }

    const ranges =
      [...new Set(questions.map(q => q.range))];

    const container =
      document.getElementById("rangeFilters");

    ranges.forEach(range => {

      const label =
        document.createElement("label");

      label.innerHTML =
        `<input type="checkbox"
                value="${range}"
                checked>
          ${range}`;

      container.appendChild(label);
    });
    
    showQuestion();
  });
      
      let current;

      function showQuestion() {

          let index;

          do {
            index = Math.floor(Math.random() * questions.length);
          } while (index === previousIndex);

          previousIndex = index;

          current = questions[index];

          currentText = "";
          currentIndex = 0;

          document.getElementById("question").textContent = "";

          startTyping();

          document.getElementById("answer").textContent = "";
        }

        document
        .getElementById("showAnswer")
        .addEventListener("click", () => {

          document.getElementById("answer").textContent =
            current.answer;

        });

      let timer = null;
      let currentText = "";
      let currentIndex = 0;
      let isPlaying = false;

      function startTyping() {
        isPlaying = true;

        timer = setInterval(() => {
          if (currentIndex >= current.question.length) {
            clearInterval(timer);
            isPlaying = false;
            return;
          }

          currentText += current.question[currentIndex];
          currentIndex++;

          document.getElementById("question").textContent =
            currentText;

        }, 100);
      }

      document.getElementById("pause")
        .addEventListener("click", function () {

          if (isPlaying) {
            clearInterval(timer);
            isPlaying = false;
            this.textContent = "START";
          }
          else {
            startTyping();
            this.textContent = "STOP";
          }

        });
      
      function getToday() {
          return new Date().toLocaleDateString("ja-JP");
        }

      function saveStudyRecord() {
          const today = getToday();

          if (!saveData.studyRecord[today]) {
            saveData.studyRecord[today] = 0;
          }

          saveData.studyRecord[today]++;

          localStorage.setItem(
            "quizApp",
            JSON.stringify(saveData)
          );
        }


      const APP_VERSION = "0.1.1";
      const SAVE_VERSION = 1;
      
      let saveData =
          JSON.parse(localStorage.getItem("quizApp"));

      if (!saveData) {
          saveData = {
            version: SAVE_VERSION,
            studyRecord: {},
            dailyStatistics: {}
          };
      }

      if (!saveData.studyRecord) {
          saveData.studyRecord = {};
      }

      if (!saveData.dailyStatistics) {
          saveData.dailyStatistics = {};
      }
      
        const today = getToday();

        if (!saveData.dailyStatistics[today]) {
          saveData.dailyStatistics[today] = {
            correct: 0,
            wrong: 0
          };
        }

      if (!saveData.studyRecord[today]) {
        saveData.studyRecord[today] = 0;
      }

      let correctCount =
        saveData.dailyStatistics[today].correct;

      let wrongCount =
        saveData.dailyStatistics[today].wrong;

      document.getElementById("next")
          .addEventListener("click", showQuestion);

      let previousIndex = -1;

      document.getElementById("correct")
          .addEventListener("click", () => {
            correctCount++;

            saveData.dailyStatistics[today].correct++;

            saveData.studyRecord[today]++;

            localStorage.setItem(
              "quizApp",
              JSON.stringify(saveData)
              );

            document.getElementById("score").textContent =
              `○: ${correctCount} ×: ${wrongCount}`;

            updateTodayRecord();
            showQuestion();
            updateChart();
            });

      document.getElementById("wrong")
          .addEventListener("click", () => {
            wrongCount++;
                                       
            saveData.dailyStatistics[today].wrong++;

            saveData.studyRecord[today]++;

            localStorage.setItem(
              "quizApp",
              JSON.stringify(saveData)
              );

            document.getElementById("score").textContent =
              `○: ${correctCount} ×: ${wrongCount}`;

            updateTodayRecord();
            showQuestion();
            updateChart();
            });

          localStorage.setItem(
            "quizApp",
            JSON.stringify(saveData)
          );

          localStorage.setItem(
            "quizApp",
            JSON.stringify(saveData)
          );

      document.getElementById("version").textContent =
          `Version ${APP_VERSION}`;

      function updateTodayRecord() {
          const today = getToday();

          const count =
            saveData.studyRecord[today] || 0;

          document.getElementById("todayRecord").textContent =
            `今日は ${count} 問解きました`;
        }

      updateTodayRecord();
      updateChart();

      document.getElementById("quizTab")
  .addEventListener("click", () => {
    document.getElementById("quizPage").style.display =
      "block";

    document.getElementById("recordPage").style.display =
      "none";
  });

document.getElementById("recordTab")
  .addEventListener("click", () => {
    document.getElementById("quizPage").style.display =
      "none";

    document.getElementById("recordPage").style.display =
      "block";
  });
        </script>
  </body>
</html>
