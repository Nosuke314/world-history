<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>世界史一問一答</title>
  </head>
  <body>
    <h1>一問一答</h1>

    <p id="question"></p>

    <button id="showAnswer">答えを見る</button>

    <p id="answer"></p>

    <button id="correct">○</button>
    <button id="wrong">×</button>

    <p id="score">○: 0 ×: 0</p>

    <button id="next">次へ</button>

    <script>
      let questions = [];

      const CSV_URL =
        "https://docs.google.com/spreadsheets/d/1eNS2fFJfqQBNNwb1vo90qftKZvcm5fRhXa7hTcu299w/gviz/tq?tqx=out:csv";

fetch(CSV_URL)
  .then(response => response.text())
  .then(text => {

    const rows = text.trim().split("\n");

    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(",");

      questions.push({
        range: cols[0],
        difficulty: cols[1],
        question: cols[2],
        answer: cols[3]
      });
    }

    showQuestion();
  });
      
      let current;

      function showQuestion() {

          let index;

          do {
            index = Math.floor(Math.random() * questions.length);
          } while (index === previousIndex);

          previousIndex = index;

          current = questions[index];

          document.getElementById("question").textContent =
            current.question;

          document.getElementById("answer").textContent = "";
        }

        document
        .getElementById("showAnswer")
        .addEventListener("click", () => {

          document.getElementById("answer").textContent =
            current.answer;

        });

      let correctCount = 0;
        let wrongCount = 0;

      document.getElementById("next")
          .addEventListener("click", showQuestion);

      let previousIndex = -1;

      document.getElementById("correct")
          .addEventListener("click", () => {
            correctCount++;

            document.getElementById("score").textContent =
              `○: ${correctCount} ×: ${wrongCount}`;

            showQuestion();
          });

      document.getElementById("wrong")
          .addEventListener("click", () => {
            wrongCount++;

            document.getElementById("score").textContent =
              `○: ${correctCount} ×: ${wrongCount}`;

            showQuestion();
          });
    </script>
  </body>
</html>
